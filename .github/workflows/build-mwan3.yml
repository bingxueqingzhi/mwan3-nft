name: Build mwan3-nft (dl12345) for Kwrt 25.12

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TARGET: x86_64

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
            msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs unzip \
            vim wget xmlto xxd zlib1g-dev file

      - name: Clone official OpenWrt 25.12
        run: |
          git clone https://github.com/openwrt/openwrt.git -b openwrt-25.12 openwrt --depth=1

      - name: Clone Kwrt overlay (25.12)
        run: |
          git clone https://github.com/kiddin9/Kwrt.git -b 25.12 kwrt --depth=1

      - name: Apply Kwrt overlay (common + x86_64) and run diy.sh
        run: |
          # 拷贝 Kwrt 的公共覆盖（含 .config、补丁、feeds 设置等）
          cp -rf kwrt/devices/common/. openwrt/
          # 拷贝 x86_64 专属覆盖（若存在）
          if [ -d "kwrt/devices/${TARGET}" ]; then
            cp -rf kwrt/devices/${TARGET}/. openwrt/
          fi
          # 跑 Kwrt 的 diy 脚本（在 kwrt 目录里跑，因为脚本是相对路径引用 devices/…）
          if [ -f "kwrt/devices/common/diy.sh" ]; then
            cd kwrt && chmod +x devices/common/diy.sh && bash devices/common/diy.sh
            cd ..
          fi

      - name: Add dl12345/mwan3-nft as highest-priority custom feed
        run: |
          mkdir -p custom_feed
          git clone https://github.com/dl12345/mwan3-nft.git custom_feed/mwan3-nft
          # 如果 feeds.conf.default 不存在就用 example 初始化
          if [ ! -f openwrt/feeds.conf.default ]; then
            cp openwrt/feeds.conf.default.example openwrt/feeds.conf.default 2>/dev/null || true
          fi
          # 把 custom 插到最前面
          sed -i '1i src-link custom '"$PWD"'/custom_feed' openwrt/feeds.conf.default
          echo "=== feeds.conf.default ==="
          cat openwrt/feeds.conf.default

      - name: Update feeds and force-override mwan3 with custom feed
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -f -p custom mwan3
          ./scripts/feeds install -f -p custom luci-app-mwan3
          # 验证：下面这个 readlink 应该指向 ../../custom_feed/mwan3-nft/mwan3
          readlink package/feeds/custom/mwan3 || true
          readlink package/feeds/custom/luci-app-mwan3 || true

      - name: Force x86_64 target in .config and run defconfig
        run: |
          cd openwrt
          # 清掉 Kwrt 可能带的其它 target，只保留 x86_64
          sed -i '/^CONFIG_TARGET_/d' .config
          cat >> .config <<'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_mwan3=y
          CONFIG_PACKAGE_luci-app-mwan3=y
          CONFIG_PACKAGE_luci-i18n-mwan3-zh-cn=y
          EOF
          make defconfig

      - name: Download dependencies
        run: |
          cd openwrt
          make -j$(nproc) download V=s

      - name: Build only the packages we need
        run: |
          cd openwrt
          make -j$(nproc) package/mwan3/compile V=s
          make -j$(nproc) package/luci-app-mwan3/compile V=s
          make -j$(nproc) package/luci-i18n-mwan3-zh-cn/compile V=s || true

      - name: Debug - list all build artifacts
        run: |
          echo "=== bin/packages tree ==="
          find openwrt/bin/packages/ -type f 2>/dev/null | head -100 || echo "no bin/packages"

      - name: Collect IPK files
        run: |
          mkdir -p upload
          find openwrt/bin/ -type f \( \
              -name "mwan3_*.ipk" -o \
              -name "luci-app-mwan3_*.ipk" -o \
              -name "luci-i18n-mwan3-*.ipk" \
            \) -exec cp -v {} upload/ \;
          echo "=== Collected files ==="
          ls -lah upload
          if [ -z "$(ls -A upload)" ]; then
            echo "::error::upload/ is empty"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mwan3-nft-ipk-x86_64-kwrt2512
          path: upload/
          if-no-files-found: error
