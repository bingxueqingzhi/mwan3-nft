name: Build mwan3-nft ipk for x86_64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
            msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs unzip \
            vim wget xmlto xxd zlib1g-dev file

      - name: Clone OpenWrt source
        run: |
          git clone https://github.com/openwrt/openwrt.git -b openwrt-24.10 openwrt

      - name: Inject local package source
        run: |
          mkdir -p openwrt/package/mwan3-nft
          rsync -a --delete ./mwan3/ openwrt/package/mwan3-nft/mwan3/
          rsync -a --delete ./luci-app-mwan3/ openwrt/package/mwan3-nft/luci-app-mwan3/

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate .config for x86_64
        run: |
          cat > openwrt/.config <<'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y

          CONFIG_PACKAGE_mwan3=y
          CONFIG_PACKAGE_luci-app-mwan3=y
          EOF
          cd openwrt
          make defconfig

      - name: Download sources
        run: |
          cd openwrt
          make download -j$(nproc) V=s

      - name: Build mwan3 packages
        run: |
          cd openwrt
          make package/mwan3-nft/mwan3/compile package/mwan3-nft/luci-app-mwan3/compile -j$(nproc) V=s

      - name: Collect ipk
        run: |
          mkdir -p upload
          find openwrt/bin/packages/ -name "*.ipk" \( -name "mwan3*.ipk" -o -name "luci-app-mwan3*.ipk" \) -exec cp {} upload/ \;
          ls -lah upload

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mwan3-nft-ipk-x86_64
          path: upload/
