# GitHub Action 的名称，会显示在 Actions 列表中
name: Build mwan3-nft ipk for x86_64

# 触发器配置
on:
  # 允许你从 GitHub Actions 页面手动触发此工作流
  workflow_dispatch:

  # 当有代码推送到 main 分支时，也会自动触发
  push:
    branches:
      - main

# 定义工作流中的任务
jobs:
  build:
    # 指定运行此任务的虚拟机环境
    # 使用 ubuntu-24.04 是很好的选择，因为它包含了较新的编译工具链，适合编译 main 分支
    runs-on: ubuntu-24.04
    env:
      # 兼容旧版 action 的环境变量，保留即可
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # 定义任务中的各个步骤
    steps:
      # 第一步：检出（下载）你的仓库代码到虚拟机
      - name: Checkout current repo
        uses: actions/checkout@v4

      # 第二步：安装 OpenWrt 编译所需的各种依赖软件包
      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
            msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs unzip \
            vim wget xmlto xxd zlib1g-dev file

      # 第三步：克隆 OpenWrt 的主开发分支 (main)
      # ！！！这是唯一的修改点，我们将分支从 "openwrt-24.10" 改为 "main" ！！！
      # "main" 分支包含了所有最新的软件包版本，包括 mwan3 v2.12+
      - name: Clone OpenWrt source
        run: |
          git clone https://github.com/openwrt/openwrt.git -b main openwrt

      # 第四步：将你的 mwan3-nft 和 luci-app-mwan3 包作为自定义 feed 添加
      # 这个方法非常棒，它会确保编译系统优先使用你的版本
      - name: Add custom packages feed
        run: |
          mkdir custom_feed
          cp -r ./mwan3/ custom_feed/mwan3
          cp -r ./luci-app-mwan3/ custom_feed/luci-app-mwan3
          echo 'src-link custom ../custom_feed' >> openwrt/feeds.conf.default

      # 第五步：更新并安装所有的 feeds
      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 第六步：生成编译配置文件 .config
      - name: Generate .config for x86_64
        run: |
          cd openwrt
          cat > .config <<'EOF'
          # 设置目标平台为 x86_64
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y

          # 选中你需要编译的最终软件包
          # 编译系统会自动分析并选中所有依赖项（如 luci-base 等）
          CONFIG_PACKAGE_mwan3=y
          CONFIG_PACKAGE_luci-app-mwan3=y
          EOF
          # 应用配置并自动选择所有必需的依赖
          make defconfig

      # 第七步：执行编译（核心步骤）
      - name: Build the firmware and packages
        run: |
          cd openwrt
          # 使用所有可用的 CPU核心进行并行编译，V=s 参数可以在出错时显示详细日志
          make -j$(nproc) V=s

      # 第八步：收集编译好的 .ipk 文件
      - name: Collect ipk files
        run: |
          mkdir -p upload
          find openwrt/bin/packages/ -type f -name "mwan3_*.ipk" -exec cp {} upload/ \;
          find openwrt/bin/packages/ -type f -name "luci-app-mwan3_*.ipk" -exec cp {} upload/ \;
          echo "Collected IPK files:"
          ls -lah upload

      # 第九步：上传 .ipk 文件作为构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mwan3-nft-ipk-x86_64
          path: upload/
