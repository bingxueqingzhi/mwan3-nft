jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
            msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs unzip \
            vim wget xmlto xxd zlib1g-dev file

      - name: Clone OpenWrt source
        run: |
          git clone https://github.com/openwrt/openwrt.git -b openwrt-24.10 openwrt

      # --- 关键改动点 1：使用自定义 feed 方式注入包，更标准 ---
      # 这种方式比 rsync 更干净，更符合 OpenWrt 的工作流
      - name: Add custom feed
        run: |
          mkdir custom_feed
          cp -r ./mwan3 custom_feed/mwan3-nft
          cp -r ./luci-app-mwan3 custom_feed/luci-app-mwan3
          echo 'src-link custom ../custom_feed' >> openwrt/feeds.conf.default
      
      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # --- 关键改动点 2：优化 .config 文件 ---
      # 直接把你的包名写进去，然后让 make defconfig 自动处理依赖
      # mwan3-nft 依赖 mwan3，luci-app-mwan3 依赖 luci，让系统自己选上
      - name: Generate .config for x86_64
        run: |
          cd openwrt
          cat > .config <<'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y

          # 直接选中你要编译的包
          CONFIG_PACKAGE_mwan3-nft=y
          CONFIG_PACKAGE_luci-app-mwan3=y
          EOF
          make defconfig

      # --- 关键改动点 3：合并所有编译步骤 ---
      # 只需要一个 make 命令，它会处理所有依赖、工具链和编译过程
      - name: Build packages
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Collect ipk
        run: |
          mkdir -p upload
          # ipk 的路径会根据包名变化，用 find 来找最稳妥
          find openwrt/bin/packages/ -name "mwan3-nft*.ipk" -exec cp {} upload/ \;
          find openwrt/bin/packages/ -name "luci-app-mwan3*.ipk" -exec cp {} upload/ \;
          ls -lah upload

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mwan3-nft-ipk-x86_64
          path: upload/
