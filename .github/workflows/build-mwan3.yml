include $(TOPDIR)/rules.mk

PKG_NAME:=mwan3
PKG_RELEASE:=1

PKG_SOURCE_URL:=https://github.com/dl12345/mwan3-nft.git
PKG_SOURCE_PROTO:=git
PKG_SOURCE_DATE:=2025-04-15
PKG_SOURCE_VERSION:=main
PKG_MIRROR_HASH:=skip

PKG_MAINTAINER:=dl12345
PKG_LICENSE:=GPL-2.0
PKG_LICENSE_FILES:=LICENSE

include $(INCLUDE_DIR)/package.mk
include $(INCLUDE_DIR)/cmake.mk

define Package/mwan3
  SECTION:=net
  CATEGORY:=Network
  SUBMENU:=Routing and Redirection
  TITLE:=Multi-WAN controller for nftables
  DEPENDS:=+libubox +libubus +libnlopt +libnftnl +nftables +musl-fts
  CONFLICTS:=mwan3
  USERID:=mwan3:mwan3
endef

define Package/mwan3/description
  Multi-WAN controller for nftables
endef

TARGET_CFLAGS += \
	-I$(STAGING_DIR)/usr/include \
	-D_GNU_SOURCE

TARGET_LDFLAGS += \
	-lfts \
	-L$(STAGING_DIR)/usr/lib

define Package/mwan3/conffiles
/etc/config/mwan3
/etc/mwan3
endef

define Package/mwan3/install
	$(INSTALL_DIR) $(1)/etc/config
	$(INSTALL_DIR) $(1)/etc/mwan3
	$(INSTALL_DIR) $(1)/etc/init.d
	$(INSTALL_DIR) $(1)/usr/sbin
	$(INSTALL_DIR) $(1)/usr/lib/mwan3
	$(INSTALL_DIR) $(1)/lib/upgrade/keep.d

	$(INSTALL_CONF) ./files/mwan3.config $(1)/etc/config/mwan3
	$(INSTALL_BIN) ./files/mwan3.init $(1)/etc/init.d/mwan3
	$(INSTALL_BIN) ./files/mwan3up $(1)/usr/sbin/mwan3up
	$(INSTALL_BIN) ./files/mwan3down $(1)/usr/sbin/mwan3down
	$(INSTALL_BIN) ./files/mwan3track $(1)/usr/sbin/mwan3track
	$(INSTALL_BIN) ./files/mwan3user $(1)/usr/sbin/mwan3user
	$(INSTALL_BIN) ./files/mwan3notify $(1)/usr/sbin/mwan3notify

	$(INSTALL_BIN) ./files/mwan3.keep $(1)/lib/upgrade/keep.d/mwan3
endef

$(eval $(call BuildPackage,mwan3))
