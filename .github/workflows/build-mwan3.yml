# GitHub Action 的名称
name: Build mwan3-nft (dl12345 version) for 25.12

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
            msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs unzip \
            vim wget xmlto xxd zlib1g-dev file

      - name: Clone OpenWrt source (main branch for 25.12)
        run: |
          git clone https://github.com/openwrt/openwrt.git -b main openwrt

      - name: Add dl12345/mwan3-nft custom feed
        run: |
          mkdir custom_feed
          git clone https://github.com/dl12345/mwan3-nft.git custom_feed/mwan3-nft
          echo 'src-link custom ../custom_feed' >> openwrt/feeds.conf.default

      - name: Update and install all feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate .config for x86_64
        run: |
          cd openwrt
          cat > .config <<'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y

          # --- 这里是关键的修改 ---
          # 新增：确保 LuCI 核心被编译，这是很多 luci-app 的隐藏依赖
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_mwan3-nft=y
          CONFIG_PACKAGE_luci-app-mwan3-nft=y
          EOF
          make defconfig

      - name: Build the packages
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Collect ipk files
        run: |
          mkdir -p upload
          find openwrt/bin/packages/ -type f -name "mwan3-nft_*.ipk" -exec cp {} upload/ \;
          find openwrt/bin/packages/ -type f -name "luci-app-mwan3-nft_*.ipk" -exec cp {} upload/ \;
          echo "Collected IPK files:"
          ls -lah upload

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mwan3-nft-dl12345-ipk-x86_64
          path: upload/
